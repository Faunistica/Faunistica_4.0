[project]
name = "faunistica-backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]",
    "slowapi",
    "geopy",
    "pygbif",
    "sqlalchemy",
    "dotenv",
    "asyncpg",
    "aiogram",
    "cryptography",
    "argon2-cffi",
    "python-jose[cryptography]",
    "pandas",
    "aiohttp",
    "openpyxl",
    "aiohttp-socks>=0.11.0",
    "greenlet>=3.3.2",
    "pyyaml",
    "alembic>=1.18.4",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = [
    "ANN",
    "PYI",
    "RSE",
    "TC",
    "I",      # isort (imports)
    "E",      # pycodestyle errors
    "F",      # Pyflakes
    "W",      # pycodestyle warnings
    "FAST",   # FastAPI-specific
    "B",      # flake8-bugbear (best practices)
    "UP",     # pyupgrade (modern Python)
    "ASYNC",  # async best practices
    "C4",     # comprehensions
    "SIM",    # simplify code
    "RET",    # return statements
    "S",      # bandit (security)
    "PL",     # Pylint
]
ignore = [
    "PLR2004" # ignore magick variables for now
]

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false
order-by-type = true

[tool.ruff.format]

[dependency-groups]
dev = [
    "mypy>=1.20.1",
    "pandas-stubs>=3.0.0.260204",
    "ruff>=0.15.7",
    "types-openpyxl>=3.1.5.20260408",
    "types-python-jose>=3.5.0.20260408",
    "types-pyyaml>=6.0.12.20260408",
]
