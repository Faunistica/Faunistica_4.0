[project]
name = "faunistica-backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi[standard]",
    "slowapi",
    "geopy",
    "pygbif",
    "sqlalchemy",
    "dotenv",
    "asyncpg",
    "aiogram",
    "cryptography",
    "argon2-cffi",
    "python-jose[cryptography]",
    "pandas",
    "httpx",
    "openpyxl",
    "aiohttp-socks>=0.11.0",
    "python-dotenv>=1.2.2",
    "greenlet>=3.3.2",
    "pyyaml",
]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["I"]

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false
order-by-type = true

[tool.ruff.format]

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "ruff>=0.15.7",
]
